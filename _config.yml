# CONFIGURACIÓN GENERAL
title: El Rincón de Hattrick
description: "Estrategias y consejos para mejorar tus juveniles y gestionar tu selección nacional en Hattrick."
url: "https://rinconhattrick.github.io"
baseurl: ""
lang: es
timezone: Europe/Madrid
image: /assets/img/default.webp
permalink: "/:categories/:title/"
author: elPatronHT
author_team_url: "https://hattrick.org/goto.ashx?path=/Club/?TeamID=538167"
color: "#4B8A61"

# Jekyll 4: builds incrementales más rápidos
incremental: true
dir: ltr

# MARKDOWN
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-search

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .git/
  - .gitignore
  - vendor/
  - _site/
  - node_modules/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      lang: "es"
      layout: "post"

future: true
